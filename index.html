<script>
    let usuarioActual = null;
    let clientes = [];
    let inventario = [];
    let empresa = {};
    let clienteSeleccionado = null;
    let articulosPresupuesto = [];

    const formatoMoneda = (valor) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(valor);

    // Escuchador de Autenticación Central con Retardo Breve para Esperar la Inicialización
    setTimeout(() => {
        window.onAuthStateChanged(window.authFirebase, async (user) => {
            if (user) {
                usuarioActual = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('user-photo').src = user.photoURL || 'https://via.placeholder.com/35';
                await cargarDatosDeFirebase();
            } else {
                usuarioActual = null;
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });
    }, 800);

    async function loginConGoogle() {
        try {
            await window.signInWithPopup(window.authFirebase, window.providerGoogle);
        } catch (e) {
            console.error(e);
            alert("Error al autenticar con Google.");
        }
    }

    async function cerrarSesion() {
        if (confirm("¿Seguro que deseas salir de la aplicación?")) {
            await window.signOut(window.authFirebase);
            location.reload();
        }
    }

    // Persistencia aislada por UID del usuario en Firestore Cloud
    async function sincronizarConFirebase(coleccion, datos) {
        if (!usuarioActual) return;
        const docRef = window.docRef(window.dbFirebase, "usuarios", usuarioActual.uid, coleccion, "lista");
        await window.setDocRef(docRef, { datos: datos });
    }

    async function cargarDatosDeFirebase() {
        if (!usuarioActual) return;
        
        const cliSnap = await window.getDocRef(window.docRef(window.dbFirebase, "usuarios", usuarioActual.uid, "clientes", "lista"));
        clientes = cliSnap.exists() ? cliSnap.data().datos : [];

        const invSnap = await window.getDocRef(window.docRef(window.dbFirebase, "usuarios", usuarioActual.uid, "inventario", "lista"));
        inventario = invSnap.exists() ? invSnap.data().datos : [];

        const empSnap = await window.getDocRef(window.docRef(window.dbFirebase, "usuarios", usuarioActual.uid, "empresa", "lista"));
        empresa = empSnap.exists() ? empSnap.data().datos : {};

        renderizarTablaClientes();
        renderizarTablaInventario();
        cargarEmpresaForm();
        actualizarVistaPresupuesto();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        const btnActivo = document.getElementById(`btn-${tabId}`);
        if(btnActivo) btnActivo.classList.add('active');
        document.getElementById(`tab-${tabId}`).classList.add('active');
        if(tabId === 'presupuesto') actualizarVistaPresupuesto();
    }

    function procesarLogo(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                empresa.logoBase64 = e.target.result;
                document.getElementById('logo-preview-img').src = empresa.logoBase64;
                document.getElementById('logo-preview-img').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    async function guardarEmpresa(e) {
        e.preventDefault();
        empresa.nit = document.getElementById('emp-nit').value;
        empresa.nombre = document.getElementById('emp-nombre').value;
        empresa.direccion = document.getElementById('emp-direccion').value;
        empresa.cp = document.getElementById('emp-cp').value;
        empresa.ciudad = document.getElementById('emp-ciudad').value;
        empresa.telefono = document.getElementById('emp-telefono').value;
        empresa.email = document.getElementById('emp-email').value;
        empresa.notas = document.getElementById('emp-notas').value;

        await sincronizarConFirebase("empresa", empresa);
        alert('Configuración corporativa guardada en la nube.');
        switchTab('presupuesto');
    }

    function cargarEmpresaForm() {
        if(empresa.nit) {
            document.getElementById('emp-nit').value = empresa.nit;
            document.getElementById('emp-nombre').value = empresa.nombre;
            document.getElementById('emp-direccion').value = empresa.direccion;
            document.getElementById('emp-cp').value = empresa.cp;
            document.getElementById('emp-ciudad').value = empresa.ciudad;
            document.getElementById('emp-telefono').value = empresa.telefono;
            document.getElementById('emp-email').value = empresa.email;
            document.getElementById('emp-notas').value = empresa.notas || '';
            if(empresa.logoBase64) {
                document.getElementById('logo-preview-img').src = empresa.logoBase64;
                document.getElementById('logo-preview-img').style.display = 'block';
            }
        }
    }

    async function guardarCliente(e) {
        e.preventDefault();
        const nuevoCliente = {
            id: Date.now(),
            nit: document.getElementById('cli-nit').value,
            nombre: document.getElementById('cli-nombre').value,
            direccion: document.getElementById('cli-direccion').value,
            cp: document.getElementById('cli-cp').value,
            ciudad: document.getElementById('cli-ciudad').value,
            telefono: document.getElementById('cli-telefono').value,
            email: document.getElementById('cli-email').value
        };
        clientes.push(nuevoCliente);
        
        // Se espera a que termine la sincronización antes de limpiar el formulario
        await sincronizarConFirebase("clientes", clientes);
        document.getElementById('form-cliente').reset(); 
        renderizarTablaClientes();
    }

    async function eliminarCliente(id) {
        if(confirm('¿Eliminar cliente permanentemente?')) {
            clientes = clientes.filter(c => c.id !== id);
            await sincronizarConFirebase("clientes", clientes);
            renderizarTablaClientes();
        }
    }

    function renderizarTablaClientes() {
        const tbody = document.querySelector('#tabla-clientes-registrados tbody');
        tbody.innerHTML = '';
        clientes.forEach(c => {
            tbody.innerHTML += `<tr>
                <td>${c.nit}</td><td><strong>${c.nombre}</strong></td><td>${c.ciudad}</td><td>${c.telefono}</td><td>${c.email}</td>
                <td><button class="btn-danger" style="padding: 5px 10px; font-size:12px;" onclick="eliminarCliente(${c.id})">Eliminar</button></td>
            </tr>`;
        });
    }

    async function guardarArticuloInventario(e) {
        e.preventDefault();
        const nuevoArticulo = {
            id: Date.now(),
            ean: document.getElementById('inv-ean').value.trim(),
            descripcion: document.getElementById('inv-descripcion').value.trim(),
            precio: parseFloat(document.getElementById('inv-precio').value)
        };
        if(inventario.some(item => item.ean === nuevoArticulo.ean)) return alert('Este código EAN ya está registrado.');
        inventario.push(nuevoArticulo);
        
        // Se espera la sincronización y luego se limpia el formulario por completo
        await sincronizarConFirebase("inventario", inventario);
        document.getElementById('form-inventario').reset();
        renderizarTablaInventario();
    }

    async function eliminarArticuloInventario(id) {
        if(confirm('¿Eliminar artículo del inventario?')) {
            inventario = inventario.filter(i => i.id !== id);
            await sincronizarConFirebase("inventario", inventario);
            renderizarTablaInventario();
        }
    }

    function renderizarTablaInventario() {
        const tbody = document.querySelector('#tabla-inventario-completo tbody');
        tbody.innerHTML = '';
        inventario.forEach(i => {
            tbody.innerHTML += `<tr>
                <td><code>${i.ean}</code></td><td>${i.descripcion}</td><td style="text-align: right;"><strong>${formatoMoneda(i.precio)}</strong></td>
                <td style="text-align: center;"><button class="btn-danger" style="padding: 5px 10px; font-size:12px;" onclick="eliminarArticuloInventario(${i.id})">Eliminar</button></td>
            </tr>`;
        });
    }

    function filtrarClientesEnVivo(query) {
        const container = document.getElementById('resultados-cliente-search');
        if(!query.trim()) return container.style.display = 'none';
        const filtrados = clientes.filter(c => c.nombre.toLowerCase().includes(query.toLowerCase()) || c.nit.includes(query));
        container.innerHTML = '';
        filtrados.forEach(c => {
            const div = document.createElement('div');
            div.className = 'search-item';
            div.innerHTML = `<strong>${c.nombre}</strong> <small>(NIT: ${c.nit})</small>`;
            div.onclick = () => {
                clienteSeleccionado = c;
                document.getElementById('buscar-cliente-input').value = c.nombre;
                container.style.display = 'none';
                actualizarVistaPresupuesto();
            };
            container.appendChild(div);
        });
        container.style.display = 'block';
    }

    function filtrarArticulosEnVivo(query) {
        const container = document.getElementById('resultados-articulo-search');
        if(!query.trim()) return container.style.display = 'none';
        const filtrados = inventario.filter(i => i.descripcion.toLowerCase().includes(query.toLowerCase()) || i.ean.includes(query));
        container.innerHTML = '';
        filtrados.forEach(i => {
            const div = document.createElement('div');
            div.className = 'search-item';
            div.innerHTML = `📦 <code>${i.ean}</code> - ${i.descripcion} | <strong>${formatoMoneda(i.precio)}</strong>`;
            div.onclick = () => {
                const ext = articulosPresupuesto.find(a => a.ean === i.ean);
                if (ext) ext.cantidad++; 
                else articulosPresupuesto.push({ ean: i.ean, descripcion: i.descripcion, precio: i.precio, Math: i.precio, cantidad: 1 });
                document.getElementById('buscar-articulo-input').value = '';
                container.style.display = 'none';
                calcularYRenderizarPreciosPresupuesto();
            };
            container.appendChild(div);
        });
        container.style.display = 'block';
    }

    function cambiarCantidad(ean, cant) {
        const item = articulosPresupuesto.find(a => a.ean === ean);
        if(item) { item.cantidad = Math.max(1, parseInt(cant) || 1); calcularYRenderizarPreciosPresupuesto(); }
    }

    function cambiarPrecioPresupuesto(ean, prc) {
        const item = articulosPresupuesto.find(a => a.ean === ean);
        if(item) { item.precio = Math.max(0, parseFloat(prc) || 0); calcularYRenderizarPreciosPresupuesto(); }
    }

    function removerArticuloPresupuesto(ean) {
        articulosPresupuesto = articulosPresupuesto.filter(a => a.ean !== ean);
        calcularYRenderizarPreciosPresupuesto();
    }

    function actualizarVistaPresupuesto() {
        document.getElementById('print-fecha').innerText = new Date().toLocaleDateString('es-CO');
        document.getElementById('print-logo-container').innerHTML = empresa.logoBase64 ? `<img class="logo-preview" src="${empresa.logoBase64}">` : '';
        if(empresa.nombre) {
            document.getElementById('print-empresa-nombre').innerText = empresa.nombre;
            document.getElementById('print-empresa-detalles').innerHTML = `NIT: ${empresa.nit}<br>Dirección: ${empresa.direccion}<br>Ciudad: ${empresa.ciudad}<br>Tel: ${empresa.telefono}`;
            document.getElementById('print-garantia').innerText = empresa.notas || '';
        }
        const infoCliente = document.getElementById('print-cliente-detalles');
        infoCliente.innerHTML = clienteSeleccionado ? `<strong>Razón Social:</strong> ${clienteSeleccionado.nombre}<br><strong>NIT:</strong> ${clienteSeleccionado.nit}<br><strong>Dirección:</strong> ${clienteSeleccionado.direccion}<br><strong>Teléfono:</strong> ${clienteSeleccionado.telefono}` : '<em>Ningún cliente seleccionado.</em>';
        calcularYRenderizarPreciosPresupuesto();
    }

    function calcularYRenderizarPreciosPresupuesto() {
        const tbody = document.getElementById('tabla-articulos-presupuesto');
        tbody.innerHTML = '';
        let subtotal = 0;
        articulosPresupuesto.forEach(a => {
            const totalFila = a.precio * a.cantidad;
            subtotal += totalFila;
            tbody.innerHTML += `<tr>
                <td><code>${a.ean}</code></td><td>${a.descripcion}</td>
                <td><input type="number" class="input-table" value="${a.cantidad}" onchange="cambiarCantidad('${a.ean}', this.value)"></td>
                <td><input type="number" class="input-price-table no-print" value="${a.precio}" onchange="cambiarPrecioPresupuesto('${a.ean}', this.value)"></td>
                <td style="text-align: right;"><strong>${formatoMoneda(totalFila)}</strong></td>
                <td class="no-print action-cell" style="text-align: center;"><button class="btn-danger" style="padding: 3px 8px;" onclick="removerArticuloPresupuesto('${a.ean}')">❌</button></td>
            </tr>`;
        });
        const iva = subtotal * 0.19;
        document.getElementById('val-subtotal').innerText = formatoMoneda(subtotal);
        document.getElementById('val-iva').innerText = formatoMoneda(iva);
        document.getElementById('val-total').innerText = formatoMoneda(subtotal + iva);
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-container')) {
            document.getElementById('resultados-cliente-search').style.display = 'none';
            document.getElementById('resultados-articulo-search').style.display = 'none';
        }
    });
</script>
